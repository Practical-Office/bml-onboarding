<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" role="img" aria-label="Kanban columns: Backlog, Build, Measure, Learn Validate, Done">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5a6b7e"/>
    </marker>
  </defs>
  <rect x="10" y="20" width="120" height="80" rx="8" fill="#faf0e5" stroke="#e0a53b" stroke-width="2"/>
  <text x="70" y="55" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="#34495d">Backlog</text>
  <rect x="150" y="20" width="120" height="80" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="210" y="55" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="#34495d">Build</text>
  <rect x="290" y="20" width="120" height="80" rx="8" fill="#fef7ec" stroke="#e0a53b" stroke-width="2"/>
