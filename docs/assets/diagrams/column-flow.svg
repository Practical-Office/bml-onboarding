  <line x1="130" y1="60" x2="148" y2="60" stroke="#5a6b7e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="270" y1="60" x2="288" y2="60" stroke="#5a6b7e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="60" x2="428" y2="60" stroke="#5a6b7e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="60" x2="588" y2="60" stroke="#5a6b7e" stroke-width="2" marker-end="url(#arrow)"/>
